# Render Blueprint for deploying the Financial Inclusion App frontend

services:
  - type: web
    name: financial-inclusion-frontend
    env: python
    region: singapore  # or choose a region closer to your users
    buildCommand: |
      pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false
    envVars:
      - key: PYTHONUNBUFFERED
        value: true
      - key: API_BASE_URL
        value: https://plp-final-project-bgex.onrender.com
      - key: API_PREFIX
        value: /api/v1
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: STREAMLIT_SERVER_HEADLESS
        value: true
      - key: STREAMLIT_SERVER_RUN_ON_SAVE
        value: "false"
    plan: free  # or upgrade to a paid plan for production
    autoDeploy: true
    numInstances: 1
    healthCheckPath: /_stcore/health
    envVars:
      - key: PORT
        value: 10000
    routes:
      - type: rewrite
        source: /(.*)
        destination: /$1
