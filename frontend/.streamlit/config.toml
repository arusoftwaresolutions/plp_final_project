[server]
headless = true
port = 8501
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false

[theme]
base = "light"
primaryColor = "#4b6cb7"
backgroundColor = "#f8f9fa"
secondaryBackgroundColor = "#ffffff"
textColor = "#2c3e50"
font = "Inter"

[logger]
level = "info"

[client]
showSidebarNavigation = false
showToolbar = false

[mapbox]
token = ""

[deprecation]
showPyplotGlobalUse = false
