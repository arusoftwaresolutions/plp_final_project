name: Deploy Financial Platform

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install backend dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run database migrations
      run: |
        cd backend
        alembic upgrade head

    - name: Seed database
      run: |
        cd backend
        python seed_data.py

    - name: Deploy backend
      run: |
        echo "Add your backend deployment commands here or trigger Railway deploy"

    - name: Deploy frontend
      run: |
        echo "Add your frontend deployment commands here or trigger Railway deploy"
