# Render configuration for Poverty Alleviation Platform (Free Tier)
# Free tier has limitations - no custom build/start commands

services:
  - type: web
    name: poverty-alleviation
    env: python
    region: oregon  # Choose closest to your users
    plan: free
    
    # Build command is automatically handled by Render
    
    # Start command for Render
    buildCommand: |
      pip install -e .
      pip install -r requirements.txt
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
        
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: poverty-db
          property: connectionString
          
      # Authentication
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
        
      # Admin user
      - key: FIRST_SUPERUSER
        value: admin
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        generateValue: true
        
      # CORS - update with your frontend URL
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:3000"]'

# Database configuration
databases:
  - name: poverty-db
    databaseName: poverty_alleviation
    user: admin
    plan: free
    deleteProtection: false
