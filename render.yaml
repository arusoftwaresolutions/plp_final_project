# Render configuration for Poverty Alleviation Platform
services:
  - type: web
    name: poverty-alleviation
    env: python
    python:
      version: 3.12.0  # Pinned to Python 3.12 for better compatibility
    region: oregon
    plan: free
    
    # Build and install dependencies with cache clearing
    buildCommand: |
      # Clear Python cache and build artifacts
      find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      find . -type f -name "*.py[co]" -delete
      rm -rf build/ dist/ *.egg-info/ .pytest_cache/ .mypy_cache/
      
      # Clear pip cache and update pip
      python -m pip cache purge || true
      python -m pip install --upgrade pip setuptools wheel
      
      # Install package in development mode and requirements using only binary wheels
      pip install --only-binary :all: --no-cache-dir -e .
      pip install --only-binary :all: --no-cache-dir -r requirements.txt
      
      # Verify all packages were installed from wheels
      pip list --format=freeze
      
    # Start command - using the main module path
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
        
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: poverty-db
          property: connectionString
          
      # Authentication
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
        
      # Admin user
      - key: FIRST_SUPERUSER
        value: admin
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        generateValue: true
        
      # CORS - update with your frontend URL
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:3000"]'

# Database configuration
databases:
  - name: poverty-db
    databaseName: poverty_alleviation
    user: admin
    plan: free
    deleteProtection: false
