# Render configuration for Poverty Alleviation Platform
services:
  - type: web
    name: poverty-alleviation
    env: python
    region: oregon
    plan: free
    
    # Build and install dependencies
    buildCommand: |
      pip install -e .
      pip install -r requirements.txt
      
    # Start command - using our app factory pattern
    startCommand: uvicorn app:app --host 0.0.0.0 --port 10000
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
        
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: poverty-db
          property: connectionString
          
      # Authentication
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
        
      # Admin user
      - key: FIRST_SUPERUSER
        value: admin
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        value: "admin123"
        
      # CORS - update with your frontend URL
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:3000"]'


# Database configuration
databases:
  - name: poverty-db
    databaseName: poverty_alleviation
    user: admin
    plan: free
    deleteProtection: false