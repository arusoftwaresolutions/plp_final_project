# Render configuration for Poverty Alleviation Platform
services:
  - type: web
    name: poverty-alleviation
    env: python
    python:
      version: 3.12.0  # Pinned to Python 3.12 for better compatibility
    region: oregon
    plan: free
    
    # Python version is set in runtime.txt and pyproject.toml
    
    # Build command with comprehensive cache cleaning
    buildCommand: |
      # Verify Python version
      echo "=== Using Python $(python --version) ==="
      
      # Clean environment - Comprehensive cache cleaning
      echo "=== Cleaning build environment and caches ==="
      
      # Python cache
      echo "Cleaning Python cache..."
      find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
      find . -type f -name "*.py[co]" -delete
      find . -type d -name "*.pyc" -exec rm -rf {} + 2>/dev/null || true
      find . -type d -name "*.pyo" -exec rm -rf {} + 2>/dev/null || true
      find . -type d -name "*__pycache__" -exec rm -rf {} + 2>/dev/null || true
      
      # Build and package cache
      echo "Cleaning build artifacts..."
      rm -rf build/ dist/ *.egg-info/ .pytest_cache/ .mypy_cache/ .coverage htmlcov/ .pytest_cache/ .mypy_cache/
      
      # Pip cache
      echo "Cleaning pip cache..."
      python -m pip cache purge 2>/dev/null || true
      
      # Node cache if exists
      if [ -d "node_modules" ]; then
        echo "Cleaning Node.js cache..."
        rm -rf node_modules/ .npm/ .cache/
      fi
      
      # Install build dependencies with cache control
      echo "=== Installing build dependencies ==="
      python -m pip install --no-cache-dir --upgrade pip setuptools wheel
      
      # Install the package in development mode with cache control
      echo "=== Installing package ==="
      pip install --no-cache-dir --no-build-isolation -e .
      
      # Clean up any remaining cache
      echo "=== Final cleanup ==="
      find /tmp -name "*.pyc" -delete 2>/dev/null || true
      find /tmp -name "*.pyo" -delete 2>/dev/null || true
      
      # Verify installations
      echo "=== Verifying installations ==="
      pip list --format=freeze
      
    # Start command - using the main module path
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    
    # Environment variables
    envVars:
      - key: ENVIRONMENT
        value: production
        
      # Database
      - key: DATABASE_URL
        fromDatabase:
          name: poverty-db
          property: connectionString
          
      # Authentication
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
        
      # Admin user
      - key: FIRST_SUPERUSER
        value: admin
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        value:"admin123"
        
      # CORS - update with your frontend URL
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:3000"]'

# Database configuration
databases:
  - name: poverty-db
    databaseName: poverty_alleviation
    user: admin
    plan: free
    deleteProtection: false
