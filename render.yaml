# Render configuration for Poverty Alleviation Platform
# Documentation: https://render.com/docs

services:
  - type: web
    name: poverty-alleviation-backend  # Update with your preferred service name
    env: python
    region: oregon  # Choose the region closest to your users
    plan: free
    
    # Build configuration
    buildCommand: ./render-build.sh
    
    # Start command - uses our optimized start script
    startCommand: ./start.sh
    
    # Environment variables
    envVars:
      # Application settings
      - key: ENVIRONMENT
        value: production
      - key: PYTHONUNBUFFERED
        value: "1"
      
      # Database configuration (automatically connected)
      - key: DATABASE_URL
        fromDatabase:
          name: poverty-db
          property: connectionString
      
      # Authentication settings
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"  # 24 hours
      
      # Admin user (password will be auto-generated)
      - key: FIRST_SUPERUSER
        value: admin
      - key: FIRST_SUPERUSER_EMAIL
        value: admin@example.com
      - key: FIRST_SUPERUSER_PASSWORD
        generateValue: true
      
      # CORS settings - update with your frontend URL
      - key: BACKEND_CORS_ORIGINS
        value: '["http://localhost:3000", "https://your-frontend-domain.com"]'

# Database configuration
databases:
  - name: poverty-db
    databaseName: poverty_alleviation
    user: admin
    plan: free  # Free tier has limited resources
    deleteProtection: false  # Set to true in production
